apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workflow-templates
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.internal.example.com/data-platform-infra.git
    targetRevision: HEAD
    path: workflow-templates
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: false     # шаблоны удалять автоматически опасно
      selfHeal: true
