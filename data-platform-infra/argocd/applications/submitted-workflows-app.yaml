apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: submitted-workflows
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.internal.example.com/data-platform-infra.git
    targetRevision: HEAD
    path: workflows/submitted
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true       # удаляет из кластера Workflow, исчезнувшие из Git
      selfHeal: false   # Workflow — одноразовый ресурс с мутирующим .status,
                        # selfHeal вызвал бы постоянный drift после запуска
    syncOptions:
      - CreateNamespace=true
      - Replace=true    # для иммутабельных полей Workflow безопаснее replace
