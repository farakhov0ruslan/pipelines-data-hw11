apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://gitlab.internal.example.com/data-platform-infra.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-workflows
      targetRevision: "0.42.2"
      helm:
        valueFiles:
          - $values/helm-releases/argo-workflows/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: false     # для стороннего ПО отключаем prune — защита от случайного удаления
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
