argo-workflows:
  enabled: true

  controller:
    replicaCount: 1
    workflowNamespaces:
      - argo
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  server:
    enabled: true
    serviceType: ClusterIP

  # Хранилище артефактов — MinIO (развёрнут в namespace minio)
  artifactRepository:
    s3:
      endpoint: minio.minio.svc.cluster.local:9000
      bucket: argo-artifacts
      insecure: true
      accessKeySecret:
        name: argo-minio-secret
        key: accessKey
      secretKeySecret:
        name: argo-minio-secret
        key: secretKey
