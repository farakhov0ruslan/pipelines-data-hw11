image:
  repository: ghcr.io/kubeflow/spark-operator
  tag: "v1.4.0"
  pullPolicy: IfNotPresent

# Пространства имён, за которыми следит оператор
sparkJobNamespace: argo

webhook:
  enable: true
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

serviceAccounts:
  spark:
    create: true
    name: spark
