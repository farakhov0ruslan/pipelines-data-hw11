apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: dashboard-ui
images:
  - name: dashboard-ui
    newName: harbor.internal.example.com/data-platform/dashboard-ui
    newTag: latest
